main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-southeast1"
          - crawl_start_date: ""
          - crawl_end_date: ""

    - maybe_set_start_date:
        switch:
          - condition: ${args != null and map.get(args, "crawl_start_date") != null}
            next: set_start_date
        next: maybe_set_end_date

    - set_start_date:
        assign:
          - crawl_start_date: ${args.crawl_start_date}

    - maybe_set_end_date:
        switch:
          - condition: ${args != null and map.get(args, "crawl_end_date") != null}
            next: set_end_date
        next: set_crawler_overrides

    - set_end_date:
        assign:
          - crawl_end_date: ${args.crawl_end_date}

    - set_crawler_overrides:
        assign:
          - crawler_overrides:
              overrides:
                containerOverrides:
                  - env:
                      - name: "START_DATE"
                        value: ${crawl_start_date}
                      - name: "END_DATE"
                        value: ${crawl_end_date}

    - log_start:
        call: sys.log
        args:
          text: "=== Daily Pipeline Started ==="
          severity: INFO

    - run_crawler:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-crawler-job"
          overrides: ${crawler_overrides}
        result: crawler_status

    - log_crawler_done:
        call: sys.log
        args:
          text: '${"Crawler finished: " + crawler_status}'
          severity: INFO

    - run_cleaner:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-text-cleaner-job"
          overrides: null
        result: cleaner_status

    - log_cleaner_done:
        call: sys.log
        args:
          text: '${"Cleaner finished: " + cleaner_status}'
          severity: INFO

    - run_classifier:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "crisis-classifier-job"
          overrides: null
        result: classifier_status

    - log_classifier_done:
        call: sys.log
        args:
          text: '${"Classifier finished: " + classifier_status}'
          severity: INFO

    - run_annotator:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-annotator-job"
          overrides: null
        result: annotator_status

    - log_annotator_done:
        call: sys.log
        args:
          text: '${"Annotator finished: " + annotator_status}'
          severity: INFO

    - run_extractor:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-extractor-job"
          overrides: null
        result: extractor_status

    - log_extractor_done:
        call: sys.log
        args:
          text: '${"Extractor finished: " + extractor_status}'
          severity: INFO

    - log_done:
        call: sys.log
        args:
          text: "=== Daily Pipeline Complete ==="
          severity: INFO

    - done:
        return:
          crawler: ${crawler_status}
          cleaner: ${cleaner_status}
          classifier: ${classifier_status}
          annotator: ${annotator_status}
          extractor: ${extractor_status}


# Subworkflow: run a Cloud Run Job and wait for completion
run_job:
  params: [project_id, region, job_name, overrides]
  steps:
    - choose_trigger_mode:
        switch:
          - condition: ${overrides != null}
            next: trigger_with_overrides
        next: trigger_without_overrides

    - trigger_with_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
          body: ${overrides}
        result: trigger_response
        next: get_execution_name

    - trigger_without_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
        result: trigger_response

    - get_execution_name:
        assign:
          - execution_name: ${trigger_response.body.metadata.name}

    - poll:
        call: http.get
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/executions/" + execution_name}'
          auth:
            type: OAuth2
        result: execution_response

    - check_done:
        switch:
          - condition: ${"completionTime" in execution_response.body.status}
            next: check_success
        next: wait

    - wait:
        call: sys.sleep
        args:
          seconds: 30
        next: poll

    - check_success:
        switch:
          - condition: ${execution_response.body.status.conditions[0].status == "True"}
            next: success
        next: failed

    - success:
        return: "succeeded"

    - failed:
        raise: '${"Job " + job_name + " failed"}'
