<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <main class="container narrow">
        <h2 class="stage-header">Article</h2>
        <p class="meta">Blob: <code>{{ blob_name }}</code></p>
        <div class="page-actions">
            <form method="POST" action="{{ confirm_action }}" class="inline">
                <input type="hidden" name="blob_name" value="{{ blob_name }}">
                <button type="submit" class="btn confirm">Confirm</button>
            </form>
            <form method="POST" action="{{ reject_action }}" class="inline">
                <input type="hidden" name="blob_name" value="{{ blob_name }}">
                <button type="submit" class="btn reject">Reject</button>
            </form>
        </div>
        <pre class="article-content">{{ content }}</pre>
    </main>
</body>
</html>
