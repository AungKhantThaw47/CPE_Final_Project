steps:
  # Validate JS syntax before building - fails fast if crawler code is broken
  - name: 'node:20-alpine'
    entrypoint: 'node'
    args: ['--check', 'Codebase_Container/crawler_job/DVB_Burmese.crawler.js']
    id: 'syntax-check'

  # Pull the existing image from Artifact Registry to use as cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_IMAGE_TAG || exit 0
    id: 'pull-cache'
    waitFor: ['syntax-check']

  # Build the image using the pulled image as cache
  # Build context is project root (.), Dockerfile is in service directory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Codebase_Container/crawler_job/Dockerfile'
      - '--cache-from'
      - '$_IMAGE_TAG'
      - '-t'
      - '$_IMAGE_TAG'
      - '.'
    id: 'build'
    waitFor: ['pull-cache']

  # Push the newly built image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_TAG'
    id: 'push'
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
