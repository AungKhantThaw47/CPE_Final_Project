steps:
  # Pull the existing image from Artifact Registry to use as cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_IMAGE_TAG || exit 0
    id: 'pull-cache'

  # Build the image using the pulled image as cache
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - '$_IMAGE_TAG'
      - '-t'
      - '$_IMAGE_TAG'
      - '.'
    id: 'build'
    waitFor: ['pull-cache']

  # Push the newly built image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_TAG'
    id: 'push'
    waitFor: ['build']

# Substitute variables from command line
substitutions:
  _IMAGE_TAG: 'PLACEHOLDER'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
