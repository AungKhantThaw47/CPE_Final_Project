steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_IMAGE_TAG || exit 0
    id: 'pull-cache'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Codebase_Container/events_api/Dockerfile'
      - '--cache-from'
      - '$_IMAGE_TAG'
      - '-t'
      - '$_IMAGE_TAG'
      - '.'
    id: 'build'
    waitFor: ['pull-cache']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_TAG'
    id: 'push'
    waitFor: ['build']

options:
  logging: CLOUD_LOGGING_ONLY
