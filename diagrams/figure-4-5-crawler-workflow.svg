  <rect class="b" x="830" y="190" width="220" height="120"/><text x="940" y="225" text-anchor="middle" class="n">Fetch article body</text><text x="940" y="248" text-anchor="middle" class="s">write text + metadata + marker</text>
  <line class="a" x1="250" y1="130" x2="290" y2="130"/><line class="a" x1="520" y1="130" x2="560" y2="130"/><line class="a" x1="790" y1="105" x2="830" y2="105"/><line class="a" x1="790" y1="155" x2="830" y2="225"/>
