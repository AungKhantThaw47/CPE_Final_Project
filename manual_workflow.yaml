main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-southeast1"
          - notify_webhook_url: ${sys.get_env("NOTIFY_WEBHOOK_URL")}
          - notify_email: ${sys.get_env("DAILY_NOTIFY_EMAIL")}

    - maybe_set_start_date:
        switch:
          - condition: ${args != null and map.get(args, "start_date") != null}
            next: set_start_date
        next: maybe_set_end_date

    - set_start_date:
        assign:
          - start_date: ${args.start_date}

    - maybe_set_end_date:
        switch:
          - condition: ${args != null and map.get(args, "end_date") != null}
            next: set_end_date
        next: maybe_set_notify_email

    - set_end_date:
        assign:
          - end_date: ${args.end_date}

    - maybe_set_notify_email:
        switch:
          - condition: ${args != null and map.get(args, "notify_email") != null}
            next: set_notify_email
        next: set_crawler_overrides

    - set_notify_email:
        assign:
          - notify_email: ${args.notify_email}

    - set_crawler_overrides:
        assign:
          - crawler_overrides:
              overrides:
                containerOverrides:
                  - env:
                      - name: "START_DATE"
                        value: ${start_date}
                      - name: "END_DATE"
                        value: ${end_date}

    - log_start:
        call: sys.log
        args:
          text: '${"=== Manual Coordinator Started (" + start_date + " to " + end_date + ") ==="}'
          severity: INFO

    - run_coordinator:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-coordinator-job"
          overrides: ${crawler_overrides}
        result: coordinator_status

    - run_classifier:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "crisis-classifier-job"
          overrides: ${crawler_overrides}
        result: classifier_status

    - notify:
        call: send_notification
        args:
          workflow_name: "manual-coordinator"
          webhook_url: ${notify_webhook_url}
          recipient_email: ${notify_email}
          coordinator_status: ${coordinator_status}
        result: notify_status

    - done:
        return:
          coordinator: ${coordinator_status}
          classifier: ${classifier_status}
          notification: ${notify_status}


send_notification:
  params: [workflow_name, webhook_url, recipient_email, coordinator_status]
  steps:
    - should_skip:
        switch:
          - condition: ${webhook_url == "" or recipient_email == ""}
            next: skipped
        next: send

    - send:
        call: http.post
        args:
          url: ${webhook_url}
          body:
            to: ${recipient_email}
            subject: ${"Pipeline Completed - " + workflow_name}
            text: '${"Coordinator=" + coordinator_status}'
            workflow: ${workflow_name}
            statuses:
              coordinator: ${coordinator_status}
        result: notify_response

    - sent:
        return: '${"sent:" + string(notify_response.code)}'

    - skipped:
        return: "skipped"


run_job:
  params: [project_id, region, job_name, overrides]
  steps:
    - choose_trigger_mode:
        switch:
          - condition: ${overrides != null}
            next: trigger_with_overrides
        next: trigger_without_overrides

    - trigger_with_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
          body: ${overrides}
        result: trigger_response
        next: get_execution_name

    - trigger_without_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
        result: trigger_response

    - get_execution_name:
        assign:
          - execution_name: ${trigger_response.body.metadata.name}

    - poll:
        call: http.get
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/executions/" + execution_name}'
          auth:
            type: OAuth2
        result: execution_response

    - check_done:
        switch:
          - condition: ${"completionTime" in execution_response.body.status}
            next: check_success
        next: wait

    - wait:
        call: sys.sleep
        args:
          seconds: 30
        next: poll

    - check_success:
        switch:
          - condition: ${execution_response.body.status.conditions[0].status == "True"}
            next: success
        next: failed

    - success:
        return: "succeeded"

    - failed:
        raise: '${"Job " + job_name + " failed"}'
