main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-southeast1"
          - crawl_start_date: ""
          - crawl_end_date: ""
          - process_date: ""
          - notify_webhook_url: ${sys.get_env("NOTIFY_WEBHOOK_URL")}
          - notify_email: ${sys.get_env("DAILY_NOTIFY_EMAIL")}

    - maybe_set_start_date:
        switch:
          - condition: ${args != null and map.get(args, "crawl_start_date") != null}
            next: set_start_date
        next: maybe_set_end_date

    - set_start_date:
        assign:
          - crawl_start_date: ${args.crawl_start_date}

    - maybe_set_end_date:
        switch:
          - condition: ${args != null and map.get(args, "crawl_end_date") != null}
            next: set_end_date
        next: maybe_set_notify_email

    - set_end_date:
        assign:
          - crawl_end_date: ${args.crawl_end_date}

    - maybe_set_notify_email:
        switch:
          - condition: ${args != null and map.get(args, "notify_email") != null}
            next: set_notify_email
        next: maybe_set_process_date_from_end

    - set_notify_email:
        assign:
          - notify_email: ${args.notify_email}

    - maybe_set_process_date_from_end:
        switch:
          - condition: ${crawl_end_date != ""}
            next: set_process_date_from_end
        next: maybe_set_process_date_from_start

    - set_process_date_from_end:
        assign:
          - end_parts: ${text.split(crawl_end_date, "-")}
          - process_date: ${end_parts[2] + "-" + end_parts[1] + "-" + end_parts[0]}

    - maybe_set_process_date_from_start:
        switch:
          - condition: ${process_date == "" and crawl_start_date != ""}
            next: set_process_date_from_start
        next: set_crawler_overrides

    - set_process_date_from_start:
        assign:
          - start_parts: ${text.split(crawl_start_date, "-")}
          - process_date: ${start_parts[2] + "-" + start_parts[1] + "-" + start_parts[0]}

    - set_crawler_overrides:
        assign:
          - crawler_overrides:
              overrides:
                containerOverrides:
                  - env:
                      - name: "START_DATE"
                        value: ${crawl_start_date}
                      - name: "END_DATE"
                        value: ${crawl_end_date}
          - process_date_overrides:
              overrides:
                containerOverrides:
                  - env:
                      - name: "PROCESS_DATE"
                        value: ${process_date}
          - classifier_date_overrides:
              overrides:
                containerOverrides:
                  - env:
                      - name: "DATE_START"
                        value: ${crawl_start_date}
                      - name: "DATE_END"
                        value: ${crawl_end_date}
                      - name: "PROCESS_DATE"
                        value: ${process_date}

    - log_start:
        call: sys.log
        args:
          text: '${"=== Manual Pipeline Started (" + crawl_start_date + " to " + crawl_end_date + ") ==="}'
          severity: INFO

    - run_crawler:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-crawler-job"
          overrides: ${crawler_overrides}
        result: crawler_status

    - run_cleaner:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "dvb-text-cleaner-job"
          overrides: ${process_date_overrides}
        result: cleaner_status

    - run_classifier:
        call: run_job
        args:
          project_id: ${project_id}
          region: ${region}
          job_name: "crisis-classifier-job"
          overrides: ${classifier_date_overrides}
        result: classifier_status

    - notify:
        call: send_notification
        args:
          workflow_name: "manual-pipeline"
          webhook_url: ${notify_webhook_url}
          recipient_email: ${notify_email}
          crawler_status: ${crawler_status}
          cleaner_status: ${cleaner_status}
          classifier_status: ${classifier_status}
        result: notify_status

    - done:
        return:
          crawler: ${crawler_status}
          cleaner: ${cleaner_status}
          classifier: ${classifier_status}
          notification: ${notify_status}


send_notification:
  params: [workflow_name, webhook_url, recipient_email, crawler_status, cleaner_status, classifier_status]
  steps:
    - should_skip:
        switch:
          - condition: ${webhook_url == "" or recipient_email == ""}
            next: skipped
        next: send

    - send:
        call: http.post
        args:
          url: ${webhook_url}
          body:
            to: ${recipient_email}
            subject: ${"Pipeline Completed - " + workflow_name}
            text: '${"Crawler=" + crawler_status + ", Cleaner=" + cleaner_status + ", Classifier=" + classifier_status}'
            workflow: ${workflow_name}
            statuses:
              crawler: ${crawler_status}
              cleaner: ${cleaner_status}
              classifier: ${classifier_status}
        result: notify_response

    - sent:
        return: '${"sent:" + string(notify_response.code)}'

    - skipped:
        return: "skipped"


run_job:
  params: [project_id, region, job_name, overrides]
  steps:
    - choose_trigger_mode:
        switch:
          - condition: ${overrides != null}
            next: trigger_with_overrides
        next: trigger_without_overrides

    - trigger_with_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
          body: ${overrides}
        result: trigger_response
        next: get_execution_name

    - trigger_without_overrides:
        call: http.post
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs/" + job_name + ":run"}'
          auth:
            type: OAuth2
        result: trigger_response

    - get_execution_name:
        assign:
          - execution_name: ${trigger_response.body.metadata.name}

    - poll:
        call: http.get
        args:
          url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/executions/" + execution_name}'
          auth:
            type: OAuth2
        result: execution_response

    - check_done:
        switch:
          - condition: ${"completionTime" in execution_response.body.status}
            next: check_success
        next: wait

    - wait:
        call: sys.sleep
        args:
          seconds: 30
        next: poll

    - check_success:
        switch:
          - condition: ${execution_response.body.status.conditions[0].status == "True"}
            next: success
        next: failed

    - success:
        return: "succeeded"

    - failed:
        raise: '${"Job " + job_name + " failed"}'
